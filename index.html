<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rift | Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Inter, sans-serif;
    background:#0a0a0a;
    color:white;
    overflow-x:hidden;
}
h1,h2,h3 { font-family: Space Grotesk, sans-serif; }

.hidden { display:none; }

/* minimal polish */
.card {
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:24px;
}
</style>
</head>

<body>

<!-- Hidden YouTube Player -->
<div id="yt-player" class="hidden"></div>

<!-- ENTER SCREEN -->
<div id="enter" class="fixed inset-0 flex items-center justify-center bg-black z-50">
    <button id="enter-btn" class="px-6 py-3 bg-purple-600 rounded-xl">
        Enter Site
    </button>
</div>

<!-- MAIN -->
<main id="main" class="opacity-0 transition-opacity duration-700 max-w-4xl mx-auto p-6 space-y-10">

<!-- DISCORD -->
<section class="card">
    <h2>Discord Profile</h2>
    <img id="dc-avatar" class="w-20 h-20 rounded-full mt-3"/>
    <p id="dc-name"></p>
    <p id="dc-status"></p>
</section>

<!-- R6 -->
<section class="card">
    <h2>R6 Stats</h2>
    <p>Peak Rank: Diamond</p>
    <p>K/D: 1.9</p>
    <a href="https://r6.tracker.network/r6siege/profile/xbl/Konk%20Juice/overview" target="_blank">View Tracker</a>
</section>

<!-- ROBLOX -->
<section class="card">
    <h2>Roblox</h2>
    <img id="rb-avatar" class="w-20 h-20 rounded"/>
    <a href="https://www.roblox.com/share?code=c177840d5c69c646bdcb71552d00fa83&type=Profile&source=ProfileShare&stamp=1777188739882" target="_blank">
        Visit Profile
    </a>
</section>

</main>

<script>

/* =========================
   MUSIC SYSTEM
========================= */

const playlist = [
    "bGNs45RlvI8",
    "IEU5I6ll-lg",
    "TjPhzgxe3L0",
    "-j4pEJGwRpw"
];

let player;
let queue = [];

function shuffle(a){
    return [...a].sort(()=>Math.random()-0.5);
}

function onYouTubeIframeAPIReady(){
    queue = shuffle(playlist);

    player = new YT.Player("yt-player",{
        height:"0",
        width:"0",
        videoId:queue[0],
        playerVars:{
            autoplay:1,
            controls:0,
            rel:0,
            modestbranding:1
        },
        events:{
            onStateChange:(e)=>{
                if(e.data===YT.PlayerState.ENDED){
                    next();
                }
            }
        }
    });
}

function next(){
    queue.shift();
    if(queue.length===0) queue = shuffle(playlist);
    player.loadVideoById(queue[0]);
}

/* =========================
   ENTER SYSTEM
========================= */

document.getElementById("enter-btn").onclick = () => {
    document.getElementById("enter").style.display="none";
    document.getElementById("main").style.opacity="1";

    setTimeout(()=>{
        player?.playVideo();
    },1000);

    loadDiscord();
    loadRoblox();
};

/* =========================
   DISCORD (LAN YARD API)
========================= */

async function loadDiscord(){
    const id="1387045742484656249";

    try{
        let res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
        let data = await res.json();

        let user = data.data.discord_user;
        let status = data.data.discord_status;

        document.getElementById("dc-avatar").src =
        `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

        document.getElementById("dc-name").innerText = user.username;
        document.getElementById("dc-status").innerText = status;

    }catch(e){
        console.log("Discord failed");
    }
}

/* =========================
   ROBLOX (SAFE FALLBACK)
========================= */

function loadRoblox(){
    document.getElementById("rb-avatar").src =
    "https://www.roblox.com/headshot-thumbnail/image?userId=1&width=420&height=420&format=png";
}

</script>

</body>
</html>
